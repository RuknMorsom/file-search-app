name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    - name: Install PWABuilder
      run: npm install -g @pwabuilder/cli
    - name: Build PWA
      run: pwa build
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: file-search-app
        path: ./out/android/*.apk
